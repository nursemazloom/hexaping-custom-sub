<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaPing - اطلاعات اشتراک</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f4f4f5; }
    </style>
</head>
<body class="p-4 md:p-8">
    
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">H</div>
            <div>
                <h1 class="text-xl font-bold text-gray-900">HexaPing</h1>
                <p class="text-xs text-gray-500">پنل کاربری اشتراک شما</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm">
             <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="flex flex-col items-center gap-4">
                    <div class="relative w-28 h-28"><svg class="w-full h-full -rotate-90" viewBox="0 0 36 36"><path class="text-gray-100" stroke-width="4" fill="none" stroke="currentColor" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="text-green-500" stroke-width="4" stroke-dasharray="47, 100" fill="none" stroke-linecap="round" stroke="currentColor" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-xl font-bold">47%</span></div></div>
                    <div class="flex items-center gap-2 text-green-600 font-bold"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>فعال</div>
                </div>
                <div class="flex-1 w-full grid grid-cols-2 md:grid-cols-3 gap-6 pt-6 border-t md:border-t-0 md:border-r md:pr-8 border-gray-100">
                    <div><p class="text-[10px] text-gray-400">حجم کل</p><p class="font-bold text-gray-900">10.00 GB</p></div>
                    <div><p class="text-[10px] text-gray-400">مصرف شده</p><p class="font-bold text-gray-900">4.74 GB</p></div>
                    <div><p class="text-[10px] text-gray-400">باقی‌مانده</p><p class="font-bold text-green-600">5.26 GB</p></div>
                    <div><p class="text-[10px] text-gray-400">تاریخ انقضا</p><p class="font-bold text-gray-900">1405/04/20</p></div>
                    <div><p class="text-[10px] text-gray-400">روزهای باقی‌مانده</p><p class="font-bold text-gray-900">24 روز</p></div>
                    <div><p class="text-[10px] text-gray-400">آخرین اتصال</p><p class="font-bold text-gray-900">1405/03/27</p></div>
                </div>
            </div>
        </div>

        <div id="appsContainer" class="space-y-4"></div>
    </div>

    <script>
        // در سرور واقعی، این خط زیر را با دیتای پنل جایگزین کن:
        // const appsData = {{ apps | tojson | safe }};
        const appsData = [
            { platform: "Android", name: "Hiddify", download_links: [{name: "Direct", url: "#"}] },
            { platform: "iOS", name: "V2Box", download_links: [{name: "AppStore", url: "#"}] }
        ];

        const appsContainer = document.getElementById('appsContainer');
        
        // گروه‌بندی برنامه‌ها بر اساس پلتفرم
        const groupedApps = appsData.reduce((acc, app) => {
            if (!acc[app.platform]) acc[app.platform] = [];
            acc[app.platform].push(app);
            return acc;
        }, {});

        Object.keys(groupedApps).forEach(platform => {
            const platformSection = document.createElement('div');
            platformSection.className = "bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm";
            
            platformSection.innerHTML = `
                <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full flex justify-between items-center p-4 bg-gray-50 font-bold text-gray-800">
                    ${platform} <span>▼</span>
                </button>
                <div class="hidden p-4 space-y-3">
                    ${groupedApps[platform].map(app => `
                        <div class="flex justify-between items-center p-2 border-b last:border-0">
                            <span>${app.name}</span>
                            <a href="${app.download_links[0].url}" class="text-blue-600 text-sm hover:underline">دانلود</a>
                        </div>
                    `).join('')}
                </div>
            `;
            appsContainer.appendChild(platformSection);
        });
    </script>
</body>
</html>
