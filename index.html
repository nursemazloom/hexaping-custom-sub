<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaPing - اطلاعات اشتراک</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background-color: #f4f4f5; /* رنگ پس‌زمینه دقیقاً مشابه سایت ارسالی */
        }
        /* کلاس‌های کمکی برای آیکون‌های SVG */
        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 3rem;
            height: 3rem;
            border-radius: 9999px;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-start justify-center min-h-screen">
    
    <div id="app" class="w-full max-w-4xl mx-auto space-y-6">
        
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                H
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900">HexaPing</h1>
                <p class="text-xs text-gray-500">پنل کاربری اشتراک شما</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="grid grid-cols-2 lg:grid-cols-4 divide-y lg:divide-y-0 lg:divide-x lg:divide-x-reverse divide-gray-100">
                
                <div class="p-4 flex items-center gap-4">
                    <div class="icon-wrapper bg-blue-50 text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-xs text-gray-500 mb-1">وضعیت</span>
                        <span class="font-bold text-sm text-gray-900 flex items-center gap-1.5" id="statusBox">
                            <span class="w-2 h-2 rounded-full bg-green-500"></span>
                            فعال
                        </span>
                    </div>
                </div>

                <div class="p-4 flex items-center gap-4 border-r lg:border-none border-gray-100">
                    <div class="icon-wrapper bg-green-50 text-green-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-xs text-gray-500 mb-1">مصرف شده</span>
                        <span class="font-bold text-sm text-gray-900" id="usedBox" dir="ltr">...</span>
                    </div>
                </div>

                <div class="p-4 flex items-center gap-4">
                    <div class="icon-wrapper bg-orange-50 text-orange-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-xs text-gray-500 mb-1">زمان باقی‌مانده</span>
                        <span class="font-bold text-sm text-gray-900" id="expireBox">...</span>
                    </div>
                </div>

                <div class="p-4 flex items-center gap-4 border-r lg:border-none border-gray-100">
                    <div class="icon-wrapper bg-purple-50 text-purple-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-xs text-gray-500 mb-1">نام کاربر</span>
                        <span class="font-bold text-sm text-gray-900" id="userNameBox">...</span>
                    </div>
                </div>

            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mt-6">
            <h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                لینک‌های اتصال
            </h3>
            <div id="linksContainer" class="flex flex-col gap-3">
                </div>
        </div>
    </div>

    <script>
        // دیتای تستی
        const mockData = {
            user: {
                username: "Amin_VIP",
                status: "active",
                data_limit: 50 * 1073741824, 
                used_traffic: 12.4 * 1073741824, 
                expire: Math.floor(Date.now() / 1000) + (25 * 86400) 
            },
            links: [
                { name: "لینک هوشمند سابسکریپشن", link: "https://sub.hexaping.com/api/v1/sub/test" },
                { name: "VLESS - همراه اول", link: "vless://fake-link-test-1" },
                { name: "VMESS - ایرانسل", link: "vmess://fake-link-test-2" }
            ]
        };

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getDaysLeft(timestamp) {
            if (!timestamp) return "نامحدود";
            const diff = timestamp - Math.floor(Date.now() / 1000);
            if (diff <= 0) return "منقضی شده";
            return Math.floor(diff / 86400) + " روز";
        }

        // تزریق اطلاعات به کادرها
        document.getElementById('userNameBox').innerText = mockData.user.username;
        document.getElementById('usedBox').innerText = formatBytes(mockData.user.used_traffic);
        document.getElementById('expireBox').innerText = getDaysLeft(mockData.user.expire);
        
        const statusElem = document.getElementById('statusBox');
        if(mockData.user.status !== "active") {
            statusElem.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span>غیرفعال';
            statusElem.className = "font-bold text-sm text-gray-900 flex items-center gap-1.5";
            statusElem.parentElement.parentElement.querySelector('.icon-wrapper').className = "icon-wrapper bg-red-50 text-red-600";
            statusElem.parentElement.parentElement.querySelector('svg').innerHTML = '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>';
        }

        // تزریق لینک‌ها
        const linksContainer = document.getElementById('linksContainer');
        mockData.links.forEach(item => {
            linksContainer.innerHTML += `
                <div class="flex items-center justify-between p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                    <span class="text-sm font-medium text-gray-700 truncate w-2/3" dir="ltr">${item.name}</span>
                    <button onclick="navigator.clipboard.writeText('${item.link}'); alert('لینک کپی شد!');" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 hover:text-blue-600 px-4 py-1.5 rounded-md text-sm font-medium transition-colors shadow-sm">
                        کپی
                    </button>
                </div>
            `;
        });
    </script>
</body>
</html>
