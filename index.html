<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaPing - داشبورد کاربری</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background-color: #f3f4f6; 
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">
    
    <div id="app" class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-6">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-indigo-600">HexaPing</h1>
            <p class="text-gray-500 text-sm mt-1">پنل مدیریت اشتراک شما در HexaPing</p>
        </div>
        
        <div class="bg-indigo-50 p-5 rounded-xl mb-6 border border-indigo-100">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-bold text-gray-800 text-lg" id="userName">نام کاربر: ...</h2>
                <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">فعال</span>
            </div>
            
            <div class="space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-600">ترافیک مصرفی:</span>
                    <span class="font-semibold text-gray-800" id="trafficInfo">...</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="trafficBar" class="bg-indigo-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
                
                <div class="flex justify-between text-sm pt-2">
                    <span class="text-gray-600">زمان باقی‌مانده:</span>
                    <span class="font-semibold text-gray-800" id="expireInfo">...</span>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-gray-800 mb-4 text-lg">لینک‌های اتصال</h3>
        <div id="linksContainer" class="flex flex-col gap-3">
            </div>
    </div>

    <script>
        // دیتای تستی برای طراحی ظاهر سایت
        const mockData = {
            user: {
                username: "Amin_VIP",
                status: "active",
                data_limit: 50 * 1073741824, // 50 گیگابایت
                used_traffic: 12 * 1073741824, // 12 گیگابایت مصرف شده
                expire: Math.floor(Date.now() / 1000) + (25 * 86400) // 25 روز مانده
            },
            links: [
                { name: "لینک هوشمند سابسکریپشن", link: "https://sub.hexaping.com/api/v1/sub/test" },
                { name: "VLESS - همراه اول", link: "vless://fake-link-test-1" },
                { name: "VMESS - ایرانسل", link: "vmess://fake-link-test-2" }
            ]
        };

        // توابع کمکی برای تبدیل بایت به گیگ و محاسبه روزها
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getDaysLeft(timestamp) {
            if (!timestamp) return "نامحدود";
            const diff = timestamp - Math.floor(Date.now() / 1000);
            if (diff <= 0) return "منقضی شده";
            return Math.floor(diff / 86400) + " روز";
        }

        // 1. تزریق اطلاعات کاربر به صفحه
        const used = mockData.user.used_traffic;
        const total = mockData.user.data_limit;
        const percent = total > 0 ? Math.min((used / total) * 100, 100) : 0;

        document.getElementById('userName').innerText = mockData.user.username;
        document.getElementById('trafficInfo').innerText = `${formatBytes(used)} از ${formatBytes(total)}`;
        document.getElementById('trafficBar').style.width = `${percent}%`;
        
        // اگر حجم رو به اتمام بود، رنگ نوار قرمز بشه
        if(percent > 80) document.getElementById('trafficBar').classList.replace('bg-indigo-500', 'bg-red-500');

        document.getElementById('expireInfo').innerText = getDaysLeft(mockData.user.expire);

        // 2. تزریق لینک‌ها به صفحه
        const linksContainer = document.getElementById('linksContainer');
        mockData.links.forEach(item => {
            linksContainer.innerHTML += `
                <div class="flex items-center justify-between p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 rounded-xl transition-colors">
                    <span class="text-sm font-semibold text-gray-700 truncate w-2/3" dir="ltr">${item.name}</span>
                    <button onclick="navigator.clipboard.writeText('${item.link}'); alert('لینک کپی شد!');" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-700 transition">
                        کپی لینک
                    </button>
                </div>
            `;
        });
    </script>
</body>
</html>
